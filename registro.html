<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta</title>
  <link rel="stylesheet" href="style.css?v=1.1">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="auth-body">
  <main class="app-shell">
    <section class="frame auth-frame">
      <header class="auth-header">
        <h1 class="auth-page-title">Criar Conta</h1>
      </header>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="tab" onclick="window.location.href='index.html'">Login</button>
          <button class="tab active">Registro</button>
        </div>

        <div class="auth-welcome">
          <h2>Novo por aqui?</h2>
          <p>Preencha seus dados para começar</p>
        </div>

        <div class="social-login">
          <button class="btn-social google" onclick="window.open('https://www.google.com/', '_blank')">
            <svg class="google-icon" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continuar com Google
          </button>
          <button class="btn-social linkedin" onclick="window.open('https://www.linkedin.com/feed/', '_blank')">
            <i class="ph-fill ph-linkedin-logo"></i>
            Continuar com LinkedIn
          </button>
        </div>

        <div class="auth-divider">
          <span>OU</span>
        </div>

        <form class="auth-form">
          <div class="form-group">
            <label for="nome">Nome Completo</label>
            <div class="input-with-icon">
              <i class="ph ph-user input-icon"></i>
              <input type="text" id="nome" placeholder="Seu nome completo">
            </div>
          </div>

          <div class="form-group">
            <label for="cpf">CPF</label>
            <div class="input-with-icon">
              <i class="ph ph-identification-card input-icon"></i>
              <input type="text" id="cpf" placeholder="000.000.000-00">
            </div>
          </div>

          <div class="form-group">
            <label for="email">E-mail</label>
            <div class="input-with-icon">
              <i class="ph ph-envelope input-icon"></i>
              <input type="email" id="email" placeholder="seu@email.com">
            </div>
          </div>

          <div class="form-group">
            <label for="senha">Senha</label>
            <div class="input-with-icon">
              <i class="ph ph-lock-key input-icon"></i>
              <input type="password" id="senha" placeholder="••••••••">
            </div>
          </div>

          <div class="checkbox-group">
            <input type="checkbox" id="terms" checked>
            <label for="terms">Concordo com os Termos de Uso</label>
          </div>

          <button type="button" class="button button-primary auth-submit" onclick="validarRegistro()" style="margin-top: 16px;">
            Criar Conta
            <i class="ph-bold ph-arrow-right"></i>
          </button>
        </form>
      </div>
    </section>
  </main>

  <script>
    function validarRegistro() {
      const nome = document.getElementById('nome').value;
      const cpf = document.getElementById('cpf').value;
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      
      if (!nome || !cpf || !email || !senha) {
        alert('Por favor, preencha todos os campos obrigatórios para criar sua conta.');
      } else if (!email.includes('@') || !email.includes('.')) {
        alert('Por favor, insira um endereço de e-mail válido (ex: seu@email.com).');
      } else {
        window.location.href = 'portal.html';
      }
    }
  </script>
</body>
</html>
